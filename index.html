<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fathimathul Ahsa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg:#0a0a0a;
  --card:#121212;
  --border:#262626;
  --accent:#e8449a;
  --text:#f5f5f5;
  --muted:#8a8a8a;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text);
}

/* container */
.wrap{
  width:100%;
  max-width:1000px;
  padding:40px;
  text-align:center;
}

/* heading */
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(32px,5vw,52px);
  margin-bottom:10px;
}

.sub{
  color:var(--muted);
  margin-bottom:50px;
  font-size:15px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

/* cards */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:50px 30px;
  text-decoration:none;
  color:inherit;
  transition:all .25s ease;
}

.card:hover{
  border-color:var(--accent);
  transform:translateY(-6px);
  box-shadow:0 0 30px rgba(232,68,154,.15);
}

.icon{
  font-size:42px;
  margin-bottom:18px;
}

.title{
  font-family:'Playfair Display',serif;
  font-size:24px;
  margin-bottom:10px;
}

.desc{
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
}

footer{
  margin-top:50px;
  font-size:12px;
  color:var(--muted);
}

/* mobile */
@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Fathimathul Ahsa</h1>
  <p class="sub">Law · Policy · Design</p>

  <div class="grid">
    
    <a href="legal.html" class="card">
      <div class="icon">⚖</div>
      <div class="title">Legal Portfolio</div>
      <div class="desc">
        Corporate law, litigation, research, and policy work.
      </div>
    </a>

    <a href="design.html" class="card">
      <div class="icon">✦</div>
      <div class="title">Design Portfolio</div>
      <div class="desc">
        Visual design, branding, and digital media projects.
      </div>
    </a>

  </div>

  <footer>
    © 2026 · CUSAT · Kerala, India
  </footer>
</div>

</body>
</html>
